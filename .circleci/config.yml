version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  test-and-build:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout
      
      # Restore cache for faster builds
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
            - v1-dependencies-
      
      # Install dependencies
      - run:
          name: Install Dependencies
          command: npm ci
      
      # Save cache
      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "package-lock.json" }}
      
      # Install Prisma CLI and generate client
      - run:
          name: Setup Prisma
          command: |
            npm install -g prisma
            npx prisma generate
      
      # Type checking
      - run:
          name: Type Check
          command: npx tsc --noEmit
      
      # Linting
      - run:
          name: Lint Check
          command: npx next lint
      
      # Build the application
      - run:
          name: Build Application
          command: npm run build
      
      # Test build output
      - run:
          name: Verify Build
          command: |
            if [ -d ".next" ]; then
              echo "✅ Build successful - .next directory exists"
              echo "Build size:"
              du -sh .next/
            else
              echo "❌ Build failed - .next directory not found"
              exit 1
            fi
      
      # Store build artifacts
      - store_artifacts:
          path: .next
          destination: build-artifacts

  deploy-staging:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm ci
      - run:
          name: Setup Prisma
          command: |
            npm install -g prisma
            npx prisma generate
      - run:
          name: Build for Staging
          command: npm run build
      - run:
          name: Deploy to Staging
          command: |
            echo "🚀 Deploying to staging environment..."
            # Add your staging deployment commands here
            # Example: npm run deploy:staging

  deploy-production:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm ci
      - run:
          name: Setup Prisma
          command: |
            npm install -g prisma
            npx prisma generate
      - run:
          name: Build for Production
          command: npm run build
      - run:
          name: Deploy to Production
          command: |
            echo "🚀 Deploying to production environment..."
            # Add your production deployment commands here
            # Example: npm run deploy:production

workflows:
  version: 2
  test-and-deploy:
    jobs:
      # Run tests and build on all branches
      - test-and-build:
          filters:
            branches:
              ignore:
                - /^wip\/.*/
      
      # Deploy to staging on develop branch
      - deploy-staging:
          filters:
            branches:
              only: develop
          requires:
            - test-and-build
      
      # Deploy to production on main branch
      - deploy-production:
          filters:
            branches:
              only: main
          requires:
            - test-and-build
