version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  test-and-build:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout
      
      # Clear any old cache to force fresh build
      - run:
          name: Clear Old Cache
          command: |
            echo "🧹 Clearing old cache..."
            rm -rf ~/.cache/circleci
            rm -rf ~/.npm
      
      # Install Bun
      - run:
          name: Install Bun
          command: |
            curl -fsSL https://bun.sh/install | bash
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            echo 'export BUN_INSTALL="$HOME/.bun"' >> $BASH_ENV
            echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> $BASH_ENV
      
      # Restore cache for faster builds
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "bun.lock" }}
            - v1-dependencies-
      
      # Install dependencies with Bun
      - run:
          name: Install Dependencies
          command: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun install
      
      # Save cache
      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "bun.lock" }}
      
      # Install Prisma CLI and generate client
      - run:
          name: Setup Prisma
          command: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun add -g prisma
            bunx prisma generate
      
      # Type checking
      - run:
          name: Type Check
          command: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bunx tsc --noEmit
      
      # Linting
      - run:
          name: Lint Check
          command: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bunx next lint
      
      # Build the application
      - run:
          name: Build Application
          command: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun run build
      
      # Test build output
      - run:
          name: Verify Build
          command: |
            if [ -d ".next" ]; then
              echo "✅ Build successful - .next directory exists"
              echo "Build size:"
              du -sh .next/
            else
              echo "❌ Build failed - .next directory not found"
              exit 1
            fi
      
      # Store build artifacts
      - store_artifacts:
          path: .next
          destination: build-artifacts

  deploy-staging:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout
      - run:
          name: Install Bun
          command: |
            curl -fsSL https://bun.sh/install | bash
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            echo 'export BUN_INSTALL="$HOME/.bun"' >> $BASH_ENV
            echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> $BASH_ENV
      - run:
          name: Install Dependencies
          command: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun install
      - run:
          name: Setup Prisma
          command: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun add -g prisma
            bunx prisma generate
      - run:
          name: Build for Staging
          command: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun run build
      - run:
          name: Deploy to Staging
          command: |
            echo "🚀 Deploying to staging environment..."
            # Add your staging deployment commands here
            # Example: bun run deploy:staging

  deploy-production:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout
      - run:
          name: Install Bun
          command: |
            curl -fsSL https://bun.sh/install | bash
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            echo 'export BUN_INSTALL="$HOME/.bun"' >> $BASH_ENV
            echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> $BASH_ENV
      - run:
          name: Install Dependencies
          command: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun install
      - run:
          name: Setup Prisma
          command: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun add -g prisma
            bunx prisma generate
      - run:
          name: Build for Production
          command: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun run build
      - run:
          name: Deploy to Production
          command: |
            echo "🚀 Deploying to production environment..."
            # Add your production deployment commands here
            # Example: bun run deploy:production

workflows:
  version: 2
  test-and-deploy:
    jobs:
      # Run tests and build on all branches
      - test-and-build:
          filters:
            branches:
              ignore:
                - /^wip\/.*/
      
      # Deploy to staging on develop branch
      - deploy-staging:
          filters:
            branches:
              only: develop
          requires:
            - test-and-build
      
      # Deploy to production on main branch
      - deploy-production:
          filters:
            branches:
              only: main
          requires:
            - test-and-build
