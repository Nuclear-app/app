version: 2.1

jobs:
  simple-test:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout
      - run:
          name: Install Bun
          command: |
            curl -fsSL https://bun.sh/install | bash
            echo 'export BUN_INSTALL="$HOME/.bun"' >> $BASH_ENV
            echo 'export PATH="$HOME/.bun/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
      - run:
          name: Install Dependencies
          command: |
            source $BASH_ENV
            bun install
      - run:
          name: Build Test
          command: |
            source $BASH_ENV
            bun run build
      - run:
          name: Success Message
          command: echo "✅ Simple build successful!"

workflows:
  version: 2
  simple:
    jobs:
      - simple-test 